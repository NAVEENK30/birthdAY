<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surprise Game</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
</head>

<body>
    <!-- Phase 1: Catch the Orb -->
    <div id="game-container" class="phase-container active">
        <h1 id="title">Unlock the Mystery</h1>
        <p id="instruction">Catch and click the orb!</p>

        <div id="orb-container">
            <div id="orb">
                <div class="orb-core"></div>
                <div class="orb-glow"></div>
            </div>
            <div id="shadow"></div>
        </div>

        <div id="progress-container">
            <div id="progress-bar"></div>
        </div>
    </div>

    <!-- Phase 2: Questions -->
    <div id="question-container" class="phase-container hidden">
        <div class="card">
            <h2 id="question-text">Question goes here...</h2>
            <div class="btn-group">
                <button id="btn-yes" class="ans-btn">Yes</button>
                <button id="btn-no" class="ans-btn outline">No</button>
            </div>
        </div>
    </div>

    <!-- Phase 3: Heart Game -->
    <div id="heart-game-container" class="phase-container hidden">
        <h2 class="heart-title">Catch 10 Skyblue Hearts! 🩵</h2>
        <p style="color: #a0a0b5; margin-bottom: 20px;">Avoid the other colors!</p>
        <div id="heart-progress-container">
            <div id="heart-progress-bar"></div>
        </div>
        <div id="heart-area"></div>
    </div>

    <!-- Phase 4: Finale -->
    <div id="finale-container" class="phase-container hidden">
        <h1 class="gradient-text finale-text">love mine<br>happy birthday</h1>
        <p>You unlocked everything! 🎉</p>
        <button id="reset-btn">Play Again</button>
    </div>

    <canvas id="confetti"></canvas>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="script.js"></script>
</body>

</html>
